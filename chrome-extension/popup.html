<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-main: #0c1017;
      --bg-card: rgba(20, 26, 38, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --accent-cyan: #00e5ff;
      --text-main: #f0f4f9;
      --text-secondary: #9eaab7;
      --success-color: #00e676;
      --error-color: #ff1744;
    }
    body {
      width: 320px;
      margin: 0;
      padding: 1.25rem;
      background: var(--bg-main);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.75rem;
    }
    .title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-main);
      margin: 0;
      letter-spacing: 0.5px;
    }
    .title span {
      color: var(--accent-cyan);
    }
    .description {
      font-size: 0.8rem;
      color: var(--text-secondary);
      line-height: 1.4;
      margin-bottom: 1.25rem;
    }
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 1.25rem;
      backdrop-filter: blur(10px);
    }
    .status-container {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }
    .status-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
    }
    .status-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-main);
    }
    .btn {
      width: 100%;
      padding: 0.75rem;
      background: linear-gradient(135deg, #00e5ff 0%, #00b0ff 100%);
      border: none;
      border-radius: 6px;
      color: #000;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(0, 229, 255, 0.2);
    }
    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(0, 229, 255, 0.35);
    }
    .btn:active {
      transform: translateY(0);
    }
    .btn:disabled {
      background: #1e2836;
      color: var(--text-secondary);
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }
    .footer {
      font-size: 0.7rem;
      color: var(--text-secondary);
      text-align: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1 class="title">Gridiron <span>Edge</span> Sync</h1>
  </div>
  <p class="description">
    Navigate to your ESPN Fantasy League tab, then click the button below to synchronize rosters, settings, and schedules instantly.
  </p>
  <div class="card">
    <div class="status-container">
      <div class="status-label">Sync Status</div>
      <div id="status" class="status-value">Detecting ESPN page...</div>
    </div>
  </div>
  <button id="sync-btn" class="btn" disabled>Sync Active League</button>
  <div class="footer">Gridiron Edge Client Sync v1.0</div>
  <script src="popup.js"></script>
</body>
</html>
